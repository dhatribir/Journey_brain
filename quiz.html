<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brain Quiz</title>
  <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
<nav class="nav"><span class="logo">🧠 Journey</span><a href="index.html">Start</a><a href="popup_brain.html">Explore</a><a href="facts.html">Brain Facts</a><a class="active" href="quiz.html">Quiz</a><a href="workshops.html">Workshops</a><a href="aboutPage.html">About</a></nav>
<main class="page">
  <div class="quiz-container">
    <h1 class="section-title">Step 3: Brain quiz</h1>
    <div class="color-strip"></div>
    <p class="mini-note">No pressure. Look at the picture first, then choose your answer. Correct answers play a tiny happy tune 🎵</p>
    <div id="quiz"></div>
    <div class="cta-row">
      <button onclick="submitQuiz()">Check my score</button>
      <button onclick="tryAgain()">Try again</button>
    </div>
    <div id="results"></div>
  </div>
  <div class="cta-row"><a class="button" href="workshops.html">Next: Turn it into a workshop →</a></div>
</main>
<footer class="footer">Mistakes are proof your brain is working.</footer>
<script>
const questionBank = [
  {
    q: 'Which object is closest to the weight of an adult human brain?',
    scene: 'weight',
    hint: 'Think of something small enough to hold in one hand, but heavier than an apple.',
    explain: 'An adult human brain is about 1.4 kg, close to a small pineapple.',
    options: ['Apple', 'Pineapple', 'Watermelon', 'Basketball'],
    answer: 'Pineapple'
  },
  {
    q: 'Your brain works really hard. About how much of your body’s oxygen does it use?',
    scene: 'oxygen',
    hint: 'It is more than a tiny amount, but not half of your oxygen.',
    explain: 'Your brain uses about 20% of your body’s oxygen.',
    options: ['5%', '10%', '20%', '50%'],
    answer: '20%'
  },
  {
    q: 'This child is looking at a rainbow. Which lobe helps with seeing?',
    scene: 'vision',
    hint: 'Look at the brain map and think about which area is used for sight.',
    explain: 'The occipital lobe helps process vision.',
    options: ['Frontal', 'Parietal', 'Temporal', 'Occipital'],
    answer: 'Occipital'
  },
  {
    q: 'This child is listening to music. Which lobe helps with hearing sounds?',
    scene: 'music',
    hint: 'Think about the part of the brain that works when your ears send sound signals.',
    explain: 'The temporal lobe helps with hearing and sound processing.',
    options: ['Frontal', 'Temporal', 'Occipital', 'Parietal'],
    answer: 'Temporal'
  },
  {
    q: 'This student is sleeping after learning something new. What helps memories stick?',
    scene: 'sleep',
    hint: 'Think about what your body needs after a busy learning day.',
    explain: 'Sleep helps your brain sort and store memories.',
    options: ['Never sleeping', 'Sleep', 'Skipping water', 'Only sugar'],
    answer: 'Sleep'
  },
  {
    q: 'This child is choosing between two snacks. Which lobe helps with decisions?',
    scene: 'decision',
    hint: 'Think about the part that helps you pause, plan, and choose.',
    explain: 'The frontal lobe helps with planning and decision making.',
    options: ['Frontal', 'Temporal', 'Occipital', 'Parietal'],
    answer: 'Frontal'
  },
  {
    q: 'This child touches a cold ice cube. Which lobe helps understand touch?',
    scene: 'touch',
    hint: 'Think about the brain area that helps you notice touch, pressure, and body position.',
    explain: 'The parietal lobe helps process touch and body position.',
    options: ['Frontal', 'Parietal', 'Temporal', 'Occipital'],
    answer: 'Parietal'
  },
  {
    q: 'Your brain sends messages through special cells. What are they called?',
    scene: 'neurons',
    hint: 'They are tiny message-carrying cells inside your nervous system.',
    explain: 'Neurons are nerve cells that send messages through the brain and body.',
    options: ['Neurons', 'Bones', 'Muscles', 'Teeth'],
    answer: 'Neurons'
  },
  {
    q: 'This child is balancing on one foot. Which part helps with balance?',
    scene: 'balance',
    hint: 'Look for the small lower back part of the brain in the diagram.',
    explain: 'The cerebellum helps with balance and coordination.',
    options: ['Cerebellum', 'Occipital lobe', 'Lungs', 'Heart'],
    answer: 'Cerebellum'
  },
  {
    q: 'Which habit is best for helping your brain stay ready to learn?',
    scene: 'healthy',
    hint: 'Choose the habit that gives your brain steady energy and rest.',
    explain: 'Sleep, water, and healthy food all help your brain learn better.',
    options: ['Sleep, water, and healthy food', 'No sleep', 'Only candy', 'Never taking breaks'],
    answer: 'Sleep, water, and healthy food'
  }
];

const sceneHTML = {
  weight: `<div class="quiz-scene weight-scene" aria-label="Brain and objects for weight comparison">
      <div class="big-emoji">🧠</div><div class="scale">⚖️</div><div class="object-row"><span>🍎</span><span>🍍</span><span>🍉</span><span>🏀</span></div>
      <p>Picture clue: compare the brain with everyday objects.</p>
    </div>`,
  oxygen: `<div class="quiz-scene oxygen-scene" aria-label="Brain using oxygen bubbles">
      <div class="mini-person">🧒</div><div class="oxygen-bubbles"><span>O₂</span><span>O₂</span><span>O₂</span><span>O₂</span><span>O₂</span></div><div class="big-emoji">🧠</div>
      <p>Your brain is small compared to your body, but it works super hard.</p>
    </div>`,
  vision: `<div class="quiz-scene brain-question-scene" aria-label="Child seeing a rainbow and brain diagram">
      <div class="scenario">👧 🌈 👀</div><div class="mini-brain-map"><span class="map-lobe f">F</span><span class="map-lobe p">P</span><span class="map-lobe t">T</span><span class="map-lobe o">O</span></div>
      <p>Picture clue: this question is about seeing.</p>
    </div>`,
  music: `<div class="quiz-scene brain-question-scene" aria-label="Child listening to music and brain diagram">
      <div class="scenario">🎧 🧒 🎶</div><div class="mini-brain-map"><span class="map-lobe f">F</span><span class="map-lobe p">P</span><span class="map-lobe t">T</span><span class="map-lobe o">O</span></div>
      <p>Picture clue: this question is about hearing sounds.</p>
    </div>`,
  sleep: `<div class="quiz-scene sleep-scene" aria-label="Student sleeping while memories organize">
      <div class="big-emoji">📚</div><div class="sleep-kid">😴</div><div class="dream-bubble">learning day</div>
      <p>Picture clue: Think about what your body needs after a busy learning day.</p>
    </div>`,
  decision: `<div class="quiz-scene decision-scene" aria-label="Child deciding between snacks">
      <div class="scenario">🍎 🤔 🧒 🍦</div><div class="mini-brain-map"><span class="map-lobe f">F</span><span class="map-lobe p">P</span><span class="map-lobe t">T</span><span class="map-lobe o">O</span></div>
      <p>Picture clue: this question is about choosing and planning.</p>
    </div>`,
  touch: `<div class="quiz-scene touch-scene" aria-label="Child touching an ice cube">
      <div class="scenario">🧒 👉 🧊</div><div class="mini-brain-map"><span class="map-lobe f">F</span><span class="map-lobe p">P</span><span class="map-lobe t">T</span><span class="map-lobe o">O</span></div>
      <p>Picture clue: this question is about touch and body feelings.</p>
    </div>`,
  neurons: `<div class="quiz-scene neuron-scene" aria-label="Neuron message diagram">
      <div class="neuron-line"><span>🧠</span><span class="spark">⚡</span><span>➡️</span><span class="spark">⚡</span><span>✋</span></div>
      <p>Picture clue: brain messages travel through tiny special cells.</p>
    </div>`,
  balance: `<div class="quiz-scene balance-scene" aria-label="Child balancing and brain diagram">
      <div class="scenario">🧒 🦶 ⚖️</div><div class="mini-brain-map cerebellum-map"><span class="map-lobe f">F</span><span class="map-lobe p">P</span><span class="map-lobe t">T</span><span class="map-lobe o">O</span><span class="map-lobe c">C</span></div>
      <p>Picture clue: this question is about balance and coordination.</p>
    </div>`,
  healthy: `<div class="quiz-scene healthy-scene" aria-label="Brain healthy habits">
      <div class="object-row"><span>💧</span><span>🥗</span><span>😴</span><span>🏃</span></div><div class="big-emoji">🧠</div>
      <p>Picture clue: your brain likes good fuel, rest, and movement.</p>
    </div>`
};

let questions = [];
const quiz = document.getElementById('quiz');

function shuffle(array){
  const a = [...array];
  for(let i=a.length-1; i>0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function newQuiz(){
  questions = shuffle(questionBank).slice(0, 5).map(q => {
    const options = shuffle(q.options);
    return {...q, options, answerIndex: options.indexOf(q.answer)};
  });
}

function render(){
  newQuiz();
  quiz.innerHTML = questions.map((x,i)=>`
    <div class="question visual-question" id="card${i}">
      <div class="question-top">
        <div class="question-number">${i+1}</div>
        <h2>${x.q}</h2>
      </div>
      ${sceneHTML[x.scene]}
      <div class="answers">
        ${x.options.map((a,j)=>`<button class="answer-choice" type="button" onclick="chooseAnswer(${i},${j}, this)">${a}</button>`).join('')}
      </div>
      <div class="feedback" id="feedback${i}"></div>
    </div>`).join('');
  document.getElementById('results').innerHTML='<p class="mini-note">Refresh or click “Try again” to get a new mix of questions.</p>';
}
render();

function happyTune(){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [523.25, 659.25, 783.99, 1046.5];
    notes.forEach((freq, index)=>{
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      osc.connect(gain); gain.connect(ctx.destination);
      const start = ctx.currentTime + index * 0.11;
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(0.16, start + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.10);
      osc.start(start); osc.stop(start + 0.12);
    });
  }catch(e){ /* no sound if browser blocks it */ }
}

function chooseAnswer(i,j,btn){
  const card = document.getElementById(`card${i}`);
  const feedback = document.getElementById(`feedback${i}`);
  card.dataset.selected = j;
  card.querySelectorAll('.answer-choice').forEach(b=>b.classList.remove('selected','correct','wrong'));
  btn.classList.add('selected');
  if(j === questions[i].answerIndex){
    btn.classList.add('correct');
    feedback.innerHTML = `🎉 Yay! Correct. <span>${questions[i].explain}</span>`;
    happyTune();
  } else {
    btn.classList.add('wrong');
    feedback.innerHTML = `🤔 Good try. Hint: ${questions[i].hint}`;
  }
}

function submitQuiz(){
  let score = 0;
  questions.forEach((x,i)=>{
    const selected = Number(document.getElementById(`card${i}`).dataset.selected);
    if(selected === x.answerIndex) score++;
  });
  document.getElementById('results').innerHTML = `<h2>You got ${score}/${questions.length}</h2><p>${score===questions.length?'Amazing! You are ready to teach someone else.':'Nice try. Use the picture clues and try a new quiz.'}</p>`;
}
function tryAgain(){render(); window.scrollTo({top:0, behavior:'smooth'});}
</script>
</body>
</html>
